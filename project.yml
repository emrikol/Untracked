name: Untracked
options:
  bundleIdPrefix: com.emrikol
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.0"
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # A warning nobody is forced to read is a warning that accumulates. The
    # build is clean today, so this costs nothing now and prevents drift.
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    # This app's real risk is concurrency: three dispatch queues plus the main
    # thread, with cross-thread state guarded by hand-rolled generation tokens.
    # `complete` makes the compiler verify the confinement discipline instead of
    # trusting comments. UI types are @MainActor; the three queue-owning types
    # are documented @unchecked Sendable. Do not downgrade this to relax a new
    # error — the error is the point.
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Untracked:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
      - path: Resources/AppIcon.icns # generated by build.sh before xcodegen runs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.emrikol.Untracked
        PRODUCT_NAME: Untracked
        DEVELOPMENT_TEAM: 3T9RX85H44
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Resources/Info.plist
        INFOPLIST_KEY_LSUIElement: true
        COMBINE_HIDPI_IMAGES: true
        ENABLE_HARDENED_RUNTIME: true
        # Lean release: whole-module optimization, dead-strip, and strip symbols
        # (≈30% smaller binary). DEPLOYMENT_POSTPROCESSING strips before signing.
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        SWIFT_COMPILATION_MODE: wholemodule
        GCC_OPTIMIZATION_LEVEL: s
        DEAD_CODE_STRIPPING: true
        DEPLOYMENT_POSTPROCESSING: true
        STRIP_INSTALLED_PRODUCT: true
        STRIP_STYLE: all
